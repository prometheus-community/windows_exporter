name: Spell checking

# Trigger on pull requests, and pushes to master branch.
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  VERSION_PROMU: 'v0.14.0'

jobs:
  codespell:
    name: Check for spelling errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: codespell-project/actions-codespell@710c0e89d3a9a8b91a7ed9c9695810354fbebc1b # master
        with:
          check_filenames: true
          # When using this Action in other repos, the --skip option below can be removed
          skip: ./.git,go.mod,go.sum
          ignore_words_list: calle,Entires
